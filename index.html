    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [dob, setDob] = React.useState('');
            const [age, setAge] = React.useState(null);
            const [maxHR, setMaxHR] = React.useState(null);
            const [zones, setZones] = React.useState({
                zone60_69: '60–69%',
                zone70_79: '70–79%',
                zone80plus: '80%+',
                zone60plus: '60%+'
            });

            useEffect(() => {
                const saved = localStorage.getItem('vitalityDOB');
                if (saved) {
                    setDob(saved);
                    calculateHR(saved);
                }
            }, []);

            function calculateHR(dobInput) {
                if (!dobInput) {
                    setAge(null);
                    setMaxHR(null);
                    setZones({
                        zone60_69: '60–69%',
                        zone70_79: '70–79%',
                        zone80plus: '80%+',
                        zone60plus: '60%+'
                    });
                    return;
                }

                const dobDate = new Date(dobInput);
                const today = new Date();
                let calculatedAge = today.getFullYear() - dobDate.getFullYear();
                if (today.getMonth() < dobDate.getMonth() || 
                    (today.getMonth() === dobDate.getMonth() && today.getDate() < dobDate.getDate())) {
                    calculatedAge--;
                }

                const calculatedMaxHR = Math.round(220 - calculatedAge);

                const z60 = Math.round(calculatedMaxHR * 0.60);
                const z69 = Math.round(calculatedMaxHR * 0.69);
                const z70 = Math.round(calculatedMaxHR * 0.70);
                const z79 = Math.round(calculatedMaxHR * 0.79);
                const z80 = Math.round(calculatedMaxHR * 0.80);

                setAge(calculatedAge);
                setMaxHR(calculatedMaxHR);
                setZones({
                    zone60_69: `${z60}–${z69} BPM`,
                    zone70_79: `${z70}–${z79} BPM`,
                    zone80plus: `≥${z80} BPM`,
                    zone60plus: `≥${z60} BPM`
                });

                localStorage.setItem('vitalityDOB', dobInput);
            }

            function handleDOBChange(e) {
                const newDob = e.target.value;
                setDob(newDob);
                calculateHR(newDob);
            }

            const hasDOB = !!maxHR;

            return (

                                    <div>

                                        <p className="text-blue-100 mt-1 text-sm md:text-base">Discovery Vitality • Official Points &amp; Partners Guide (2025/2026)</p>
                                    </div>
                                </div>
                                <a href="https://www.discovery.co.za/assets/discoverycoza/vitality/how-to-join/points-and-partners.pdf" 
                                   target="_blank"
                                   className="flex items-center gap-x-2 bg-white/90 text-[#00a3e0] px-5 py-3 rounded-2xl font-semibold hover:bg-white text-sm md:text-base whitespace-nowrap">
                                    <i className="fa-solid fa-file-pdf"></i>
                                    Original PDF
                                </a>
                            </div>

                                        <h2 className="text-xl md:text-2xl font-semibold">Your Personal Heart Rate Zones</h2>
                                        <p className="text-blue-100 mt-2 text-sm md:text-base">Enter date of birth → tables update with exact BPM ranges</p>
                                    </div>
                                    <div className="flex-1">
                                        <input 
                                            type="date" 
                                            value={dob}
                                            onChange={handleDOBChange}
                                            className="max-w-xs bg-white text-gray-900 rounded-2xl px-5 py-4 text-base focus:outline-none focus:ring-4 focus:ring-white/50"
                                        />
                                    </div>
                                </div>

                                                <div className="text-5xl md:text-6xl font-bold text-[#00a3e0]">{age}</div>
                                            </div>
                                            <div>

                                                <div className="text-5xl md:text-6xl font-bold">{maxHR} BPM</div>
                                            </div>

                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
