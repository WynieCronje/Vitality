<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Vitality Points Explorer • Discovery Vitality</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-bg { background: linear-gradient(90deg, #00a3e0, #0077b6); }
        .section-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .section-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [dob, setDob] = React.useState('');
            const [age, setAge] = React.useState(null);
            const [maxHR, setMaxHR] = React.useState(null);
            const [zones, setZones] = React.useState({
                zone60_69: '60–69%',
                zone70_79: '70–79%',
                zone80plus: '80%+',
                zone60plus: '60%+'
            });

            // Load DOB from localStorage
            useEffect(() => {
                const saved = localStorage.getItem('vitalityDOB');
                if (saved) {
                    setDob(saved);
                    calculateHR(saved);
                }
            }, []);

            function calculateHR(dobInput) {
                if (!dobInput) {
                    setAge(null);
                    setMaxHR(null);
                    setZones({
                        zone60_69: '60–69%',
                        zone70_79: '70–79%',
                        zone80plus: '80%+',
                        zone60plus: '60%+'
                    });
                    return;
                }

                const dobDate = new Date(dobInput);
                const today = new Date();
                let calculatedAge = today.getFullYear() - dobDate.getFullYear();
                if (today.getMonth() < dobDate.getMonth() || 
                    (today.getMonth() === dobDate.getMonth() && today.getDate() < dobDate.getDate())) {
                    calculatedAge--;
                }

                const calculatedMaxHR = Math.round(220 - calculatedAge);

                const z60 = Math.round(calculatedMaxHR * 0.60);
                const z69 = Math.round(calculatedMaxHR * 0.69);
                const z70 = Math.round(calculatedMaxHR * 0.70);
                const z79 = Math.round(calculatedMaxHR * 0.79);
                const z80 = Math.round(calculatedMaxHR * 0.80);

                setAge(calculatedAge);
                setMaxHR(calculatedMaxHR);
                setZones({
                    zone60_69: `${z60}–${z69} BPM`,
                    zone70_79: `${z70}–${z79} BPM`,
                    zone80plus: `≥${z80} BPM`,
                    zone60plus: `≥${z60} BPM`
                });

                localStorage.setItem('vitalityDOB', dobInput);
            }

            function handleDOBChange(e) {
                const newDob = e.target.value;
                setDob(newDob);
                calculateHR(newDob);
            }

            const hasDOB = !!maxHR;

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* HEADER */}
                    <div className="header-bg text-white pb-12">
                        <div className="max-w-7xl mx-auto px-6 pt-8">
                            <div className="flex justify-between items-start">
                                <div className="flex items-center gap-x-4">
                                    <i className="fa-solid fa-heart-pulse text-5xl"></i>
                                    <div>
                                        <h1 className="text-4xl font-semibold tracking-tight">Vitality Points Explorer</h1>
                                        <p className="text-blue-100 mt-1">Discovery Vitality • All ways to earn points</p>
                                    </div>
                                </div>
                                <a 
                                    href="https://www.discovery.co.za/assets/discoverycoza/vitality/how-to-join/points-and-partners.pdf"
                                    target="_blank"
                                    className="flex items-center gap-x-2 bg-white/90 text-[#00a3e0] px-6 py-3 rounded-2xl font-semibold hover:bg-white"
                                >
                                    <i className="fa-solid fa-file-pdf"></i>
                                    View PDF
                                </a>
                            </div>

                            {/* DOB Section */}
                            <div className="mt-10 bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/30">
                                <div className="flex flex-col lg:flex-row gap-8">
                                    <div className="flex-1">
                                        <h2 className="text-2xl font-semibold">Personal Heart Rate Zones</h2>
                                        <p className="text-blue-100 mt-2">Enter your date of birth for exact BPM ranges</p>
                                    </div>
                                    <div className="flex-1">
                                        <input 
                                            type="date" 
                                            value={dob}
                                            onChange={handleDOBChange}
                                            className="w-full bg-white text-gray-900 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:ring-4 focus:ring-white/50"
                                        />
                                    </div>
                                </div>

                                {/* HR Results */}
                                {hasDOB && (
                                    <div className="mt-8 bg-white rounded-3xl p-8 text-gray-900">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-8 items-center">
                                            <div>
                                                <div className="text-sm text-gray-500">AGE</div>
                                                <div className="text-6xl font-bold text-[#00a3e0]">{age}</div>
                                            </div>
                                            <div>
                                                <div className="text-sm text-gray-500">MAX HR</div>
                                                <div className="text-6xl font-bold">{maxHR} BPM</div>
                                            </div>
                                            <div className="md:col-span-2">
                                                <div className="text-sm font-medium mb-3">YOUR ZONES</div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div className="text-center bg-green-50 rounded-2xl py-4">
                                                        <div className="text-green-600 text-xs font-medium">60–69%</div>
                                                        <div className="font-mono text-xl font-semibold">{zones.zone60_69}</div>
                                                    </div>
                                                    <div className="text-center bg-yellow-50 rounded-2xl py-4">
                                                        <div className="text-yellow-600 text-xs font-medium">70–79%</div>
                                                        <div className="font-mono text-xl font-semibold">{zones.zone70_79}</div>
                                                    </div>
                                                    <div className="text-center bg-orange-50 rounded-2xl py-4">
                                                        <div className="text-orange-600 text-xs font-medium">80%+</div>
                                                        <div className="font-mono text-xl font-semibold">{zones.zone80plus}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 py-12">
                        <div className="section-card bg-white rounded-3xl p-8 shadow-sm">
                            <h2 className="text-3xl font-semibold flex items-center gap-x-3 mb-2">
                                <i className="fa-solid fa-running text-[#00a3e0]"></i>
                                Fitness Points
                            </h2>
                            <p className="text-gray-600 mb-8">Best activity of the day wins. All percentages update with your personal zones.</p>

                            {/* 18–64 Table */}
                            <h3 className="font-semibold text-xl mb-4 mt-8">Ages 18–64</h3>
                            <div className="overflow-x-auto rounded-2xl border">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-100">
                                        <tr>
                                            <th className="text-left px-6 py-4">Activity</th>
                                            <th className="text-right px-6 py-4">Points</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        <tr><td className="px-6 py-4">Vitality online workout (30+ min)</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">50</td></tr>
                                        <tr><td className="px-6 py-4">Vitality Anywhere (30+ min)</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">Gym workout (30+ min)</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">10,000+ steps</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">30–59 min @ {zones.zone60_69}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">60–89 min @ {zones.zone60_69}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">200</td></tr>
                                        <tr><td className="px-6 py-4">90+ min @ {zones.zone60plus}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">300</td></tr>
                                        <tr><td className="px-6 py-4">15–29 min @ {zones.zone70_79}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">30–59 min @ {zones.zone70_79}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">200</td></tr>
                                        <tr><td className="px-6 py-4">60+ min @ {zones.zone70_79}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">300</td></tr>
                                        <tr><td className="px-6 py-4">30+ min @ {zones.zone80plus}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">300</td></tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* 65+ Table */}
                            <h3 className="font-semibold text-xl mb-4 mt-12">Ages 65+</h3>
                            <div className="overflow-x-auto rounded-2xl border">
                                <table className="w-full text-sm">
                                    <thead className="bg-gray-100">
                                        <tr>
                                            <th className="text-left px-6 py-4">Activity</th>
                                            <th className="text-right px-6 py-4">Points</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        <tr><td className="px-6 py-4">Vitality online workout (30+ min)</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">50</td></tr>
                                        <tr><td className="px-6 py-4">Vitality Anywhere (30+ min)</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">Gym workout (30+ min)</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">7,500+ steps</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">30–59 min @ {zones.zone60_69}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">60–89 min @ {zones.zone60_69}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">200</td></tr>
                                        <tr><td className="px-6 py-4">15–29 min @ {zones.zone70_79}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">100</td></tr>
                                        <tr><td className="px-6 py-4">30+ min @ {zones.zone70_79}</td><td className="text-right px-6 py-4 font-semibold text-[#00a3e0]">300</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="text-center text-gray-400 text-xs mt-16">
                            All data from official Discovery Vitality Points &amp; Partners PDF • DOB saved in browser
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(
            React.createElement(App),
            document.getElementById('root')
        );
    </script>
</body>
</html>
