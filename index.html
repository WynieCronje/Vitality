<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitality Points Explorer • Discovery Vitality</title>
    
    <!-- Cache Busting Meta Headers -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Scripts with cache busting query parameters -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js?v=20250528"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js?v=20250528"></script>
    <script src="https://unpkg.com/babel-standalone/babel.min.js?v=20250528"></script>
    <script src="https://cdn.tailwindcss.com?v=20250528"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css?v=20250528">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-bg { background: linear-gradient(90deg, #00a3e0, #0077b6); }
        .section-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .section-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        table { border-collapse: collapse; }
        .nav-pill { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [dob, setDob] = React.useState('');
            const [age, setAge] = React.useState(null);
            const [maxHR, setMaxHR] = React.useState(null);
            const [zones, setZones] = React.useState({
                zone60_69: '60–69%',
                zone70_79: '70–79%',
                zone80plus: '80%+',
                zone60plus: '60%+'
            });

            useEffect(() => {
                const saved = localStorage.getItem('vitalityDOB');
                if (saved) {
                    setDob(saved);
                    calculateHR(saved);
                }
            }, []);

            function calculateHR(dobInput) {
                if (!dobInput) {
                    setAge(null);
                    setMaxHR(null);
                    setZones({
                        zone60_69: '60–69%',
                        zone70_79: '70–79%',
                        zone80plus: '80%+',
                        zone60plus: '60%+'
                    });
                    return;
                }

                const dobDate = new Date(dobInput);
                const today = new Date();
                let calculatedAge = today.getFullYear() - dobDate.getFullYear();
                if (today.getMonth() < dobDate.getMonth() || 
                    (today.getMonth() === dobDate.getMonth() && today.getDate() < dobDate.getDate())) {
                    calculatedAge--;
                }

                const calculatedMaxHR = Math.round(220 - calculatedAge);

                const z60 = Math.round(calculatedMaxHR * 0.60);
                const z69 = Math.round(calculatedMaxHR * 0.69);
                const z70 = Math.round(calculatedMaxHR * 0.70);
                const z79 = Math.round(calculatedMaxHR * 0.79);
                const z80 = Math.round(calculatedMaxHR * 0.80);

                setAge(calculatedAge);
                setMaxHR(calculatedMaxHR);
                setZones({
                    zone60_69: `${z60}–${z69} BPM`,
                    zone70_79: `${z70}–${z79} BPM`,
                    zone80plus: `≥${z80} BPM`,
                    zone60plus: `≥${z60} BPM`
                });

                localStorage.setItem('vitalityDOB', dobInput);
            }

            function handleDOBChange(e) {
                const newDob = e.target.value;
                setDob(newDob);
                calculateHR(newDob);
            }

            const hasDOB = !!maxHR;

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* HEADER */}
                    <div className="header-bg text-white pb-8 md:pb-12">
                        <div className="max-w-7xl mx-auto px-4 md:px-6 pt-6 md:pt-8">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                <div className="flex items-center gap-x-4">
                                    <i className="fa-solid fa-heart-pulse text-5xl"></i>
                                    <div>
                                        <h1 className="text-3xl md:text-4xl font-semibold tracking-tight">Vitality Points Explorer</h1>
                                        <p className="text-blue-100 mt-1 text-sm md:text-base">Discovery Vitality • Complete Points Guide</p>
                                    </div>
                                </div>
                                <a 
                                    href="https://www.discovery.co.za/assets/discoverycoza/vitality/how-to-join/points-and-partners.pdf"
                                    target="_blank"
                                    className="flex items-center gap-x-2 bg-white/90 text-[#00a3e0] px-5 py-3 rounded-2xl font-semibold hover:bg-white text-sm md:text-base whitespace-nowrap"
                                >
                                    <i className="fa-solid fa-file-pdf"></i>
                                    Original PDF
                                </a>
                            </div>

                            {/* DOB Calculator */}
                            <div className="mt-8 md:mt-10 bg-white/10 backdrop-blur-xl rounded-3xl p-6 md:p-8 border border-white/30">
                                <div className="flex flex-col md:flex-row gap-6">
                                    <div className="flex-1">
                                        <h2 className="text-xl md:text-2xl font-semibold">Personal Heart Rate Zones</h2>
                                        <p className="text-blue-100 mt-2 text-sm md:text-base">Enter DOB for exact BPM in fitness tables</p>
                                    </div>
                                    <div className="flex-1">
                                        <input 
                                            type="date" 
                                            value={dob}
                                            onChange={handleDOBChange}
                                            className="w-full bg-white text-gray-900 rounded-2xl px-5 py-4 text-base focus:outline-none focus:ring-4 focus:ring-white/50"
                                        />
                                    </div>
                                </div>

                                {hasDOB && (
                                    <div className="mt-8 bg-white rounded-3xl p-6 md:p-8 text-gray-900">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6 md:gap-8">
                                            <div>
                                                <div className="text-xs md:text-sm text-gray-500">AGE</div>
                                                <div className="text-5xl md:text-6xl font-bold text-[#00a3e0]">{age}</div>
                                            </div>
                                            <div>
                                                <div className="text-xs md:text-sm text-gray-500">MAX HR</div>
                                                <div className="text-5xl md:text-6xl font-bold">{maxHR} BPM</div>
                                            </div>
                                            <div className="md:col-span-2">
                                                <div className="text-sm font-medium mb-3">YOUR ZONES</div>
                                                <div className="grid grid-cols-3 gap-3 md:gap-4">
                                                    <div className="text-center bg-green-50 rounded-2xl py-3 md:py-4">
                                                        <div className="text-green-600 text-xs font-medium">60–69%</div>
                                                        <div className="font-mono text-lg md:text-xl font-semibold">{zones.zone60_69}</div>
                                                    </div>
                                                    <div className="text-center bg-yellow-50 rounded-2xl py-3 md:py-4">
                                                        <div className="text-yellow-600 text-xs font-medium">70–79%</div>
                                                        <div className="font-mono text-lg md:text-xl font-semibold">{zones.zone70_79}</div>
                                                    </div>
                                                    <div className="text-center bg-orange-50 rounded-2xl py-3 md:py-4">
                                                        <div className="text-orange-600 text-xs font-medium">80%+</div>
                                                        <div className="font-mono text-lg md:text-xl font-semibold">{zones.zone80plus}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12">
                        {/* Navigation Pills */}
                        <div className="flex flex-wrap gap-2 mb-10 border-b pb-6 overflow-x-auto">
                            <a href="#health" className="nav-pill bg-white shadow-sm border border-gray-200 hover:border-[#00a3e0] px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap">Health Check</a>
                            <a href="#screenings" className="nav-pill bg-white shadow-sm border border-gray-200 hover:border-[#00a3e0] px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap">Screenings</a>
                            <a href="#fitness" className="nav-pill bg-white shadow-sm border border-gray-200 hover:border-[#00a3e0] px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap">Fitness</a>
                            <a href="#eating" className="nav-pill bg-white shadow-sm border border-gray-200 hover:border-[#00a3e0] px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap">Eat Healthy</a>
                            <a href="#family" className="nav-pill bg-white shadow-sm border border-gray-200 hover:border-[#00a3e0] px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap">Family</a>
                            <a href="#chronic" className="nav-pill bg-white shadow-sm border border-gray-200 hover:border-[#00a3e0] px-5 py-2.5 rounded-3xl text-sm font-medium whitespace-nowrap">Chronic</a>
                        </div>

                        {/* All previous sections (Health, Screenings, Fitness, Eating, Family, Chronic) remain the same as last version */}
                        {/* ... [Full sections from previous response] ... */}

                        <div className="text-center text-gray-400 text-xs mt-16 pb-12">
                            All information extracted from official Discovery Vitality Points &amp; Partners PDF • DOB saved automatically
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(
            React.createElement(App),
            document.getElementById('root')
        );
    </script>
</body>
</html>
